      # Diapositiva 1: Introducción
      intro_mod: Campbooks
      s1_title: "Esto es Campbooks -- la bandeja de entrada que se ordena sola."
      s1_sub: Un cliente de correo con un asistente integrado, para quienes se ahogan en correo profesional y papeleo.
      s1_rot_lead: "Scout, tu asistente,"
      s1_r0_h: "lee cada correo, para que tú no tengas que hacerlo."
      s1_r0_p: "Cada mensaje recibe un análisis de una línea: qué es, qué te pide, si puede esperar."
      s1_r1_h: "archiva las facturas, recibos y contratos."
      s1_r1_p: Los adjuntos se convierten en documentos rastreados y buscables -- clasificados, etiquetados y listos para la declaración fiscal.
      s1_r2_h: detecta los plazos antes de que se escapen.
      s1_r2_p: Las fechas enterradas en el correo aparecen como recordatorios -- tu calendario solo cambia cuando lo autorizas.
      s1_r3_h: acalla los boletines y las notificaciones.
      s1_r3_p: El ruido se colapsa en grupos ordenados que puedes revisar en segundos -- anunciado, reversible, nunca perdido.
      s1_r4_h: te entrega la lista corta que realmente te necesita.
      s1_r4_p: Abres la app para dos o tres cosas, no para doscientas.
      s1_close_b: "Tú decides. Scout hace la parte aburrida."
      s1_close: Todo lo que hace está anunciado, es reversible y tuyo para aprobar.

      # Diapositiva 2: Bandeja de entrada
      inbox_mod: Bandeja de entrada
      s2_title: El correo llega ya ordenado.
      s2_body1_html: "Los boletines, notificaciones y promociones <b>se agrupan en pilas ordenadas</b> en lugar de enterrar tu mañana -- revísalas en segundos o ignóralas por completo. Lo que realmente necesita respuesta permanece en primer plano con el análisis de una línea de Scout."
      s2_body2_html: "Las etiquetas se aplican solas cuando llega el correo: <b>anunciadas y reversibles</b>, sin preguntas que responder. Tus carpetas por fin se archivan solas."
      s2_group_label: Notificaciones y boletines

      # Diapositiva 3: Calendario
      calendar_mod: Calendario
      s3_title: Tu bandeja y tu calendario por fin se hablan.
      s3_body1_html: "Un correo '¿funciona el jueves?' se convierte en un <b>evento borrador</b> -- título correcto, hora correcta, un toque para añadir. No más reescribir quién y cuándo."
      s3_body2_html: "Los compromisos con fecha -- una factura a pagar, una renovación, un vuelo -- aparecen como <b>recordatorios que confirmas</b> en el calendario. La sincronización bidireccional mantiene a Google y Zoho en orden, en ambas direcciones."
      s3_ev_title: Reunión de inicio con Dana
      s3_ev_time: "Jue . 14:30 - 15:00 . borrador del correo de ella"
      s3_ev_add: Añadir al calendario
      s3_ev_added: Añadido
      s3_rem_sender: "Pago . en 11 días"
      s3_rem_subj: "Factura Streamline #10-449 . $49,00"
      s3_rem_add: Añadir al calendario
      s3_rem_added: En tu calendario

      # Diapositiva 4: Tareas (con bandera de funcionalidad)
      tasks_mod: Tareas
      s4_title: Convierte cualquier correo en una tarea.
      s4_body1_html: "Scout detecta las peticiones ocultas en tu correo -- \"¿puedes enviar el informe antes del viernes?\" -- y se ofrece a convertirlas en tareas con <b>fechas de entrega asociadas</b>."
      s4_body2_html: "Trabájalas en lista o en tablero; márcalas como completadas y <b>nada prometido se pierde</b> tres respuestas más abajo en un hilo."

      # Diapositiva 5: Documentos
      docs_mod: Documentos
      s5_title: El papeleo que se archiva solo.
      s5_body1_html: "Cada adjunto se convierte en un <b>documento rastreado</b>: tipo reconocido, los campos clave -- proveedor, importe, fecha de vencimiento -- extraídos y buscables desde el primer día."
      s5_body2_html: "Apruebas o corriges con un toque. <b>La declaración de impuestos deja de ser arqueología</b> -- es un cuadro de búsqueda."
      s5_doc_type: Factura de gastos
      s5_field_vendor_label: Proveedor
      s5_field_amount_label: Importe
      s5_field_due_label: Fecha de vencimiento
      s5_reclassify: Reclasificar
      s5_approve: Aprobar
      s5_approved: Aprobado

      # Diapositiva 6: Mucho más
      more_mod: Mucho más
      s6_title: "Y eso es solo la versión corta."
      s6_body: Revisa tu bandeja como stories. Pregúntale a Scout cualquier cosa sobre tu correo y archivos, en lenguaje natural. Crea tus propias reglas y grupos -- o profundiza con resúmenes, plantillas, una API REST y alojamiento propio.
