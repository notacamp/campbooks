pt:
  ai_configurations:
    update:
      assignment_updated: Atribuição de %{purpose} atualizada.
      failed_to_save: 'Falha ao guardar %{purpose}: %{errors}'
      is_unassigned: "%{purpose} não está atribuído."
      reset_to_unassigned: "%{purpose} reposto para não atribuído."
  inbox_settings:
    accounts:
      scan_now:
        started: Verificação iniciada. As novas mensagens aparecerão em breve.
    tags:
      destroy:
        cannot_delete: A etiqueta security_flagged não pode ser eliminada.
  settings:
    ai_adapters:
      create:
        created: Adaptador de IA "%{name}" criado.
        failed: 'Falha ao criar o adaptador: %{errors}'
      destroy:
        deleted: Adaptador de IA "%{name}" eliminado.
        in_use: Não é possível eliminar "%{name}" — ainda está atribuído a serviços.
      managed_not_editable: O Campbooks AI é gerido por nós — mude de modo nas Definições
        em vez de o editar.
      update:
        failed: 'Falha ao atualizar o adaptador: %{errors}'
        updated: Adaptador de IA "%{name}" atualizado.
        updated_env_key: Adaptador de IA "%{name}" atualizado (a utilizar chave de
          ambiente se disponível).
    general:
      update:
