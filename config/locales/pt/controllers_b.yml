    integrations:
      connections:
        create:
          created: Ligação "%{name}" criada.
        destroy:
          deleted: Ligação "%{name}" eliminada.
        update:
          updated: Ligação "%{name}" atualizada.
      google_drive:
        destroy:
          disconnected: Google Drive desligado.
      google_drive_configs:
        update:
          saved: Configuração do Google Drive atualizada.
      notion:
        destroy:
          disconnected: Integração com Notion desligada.
        update:
          saved: Integração com Notion atualizada.
          workspace_warning: 'Ligado, mas não foi possível obter informações do espaço
            de trabalho: %{error}'
      zoho_drive:
        destroy:
          mapping_not_found: Mapeamento não encontrado.
          mapping_removed: Mapeamento removido.
        update:
          mapping_saved: Mapeamento de pasta guardado.
    invitations:
      create:
        pending_review: Convite para %{email} submetido para revisão pelo administrador.
        sent: Convite enviado para %{email}.
      destroy:
        cancelled: Convite cancelado.
      resend:
        resent: Convite reenviado para %{email}.
