        skip: Ignorar por agora
        skip_hint: Pode escolher uma configuração mais tarde nas Definições.
        templates:
          freelancer:
            name: Freelancer
            description: Gerencie clientes, faturas, contratos e papelada de projetos num único lugar.
          small_business:
            name: Pequena empresa
            description: Controle faturas de fornecedores, extratos bancários, recibos de vencimento e comunicações da equipa.
          personal_admin:
            name: Administração pessoal
            description: Organize contas, apólices de seguro, cartas de entidades governamentais e papelada doméstica.
          job_hunt:
            name: À procura de emprego
            description: Acompanhe candidaturas, convites para entrevistas e ofertas sem perder nada.
          accountant:
            name: Contabilista / técnico oficial de contas
            description: Gira as declarações, e-faturas e IVA de vários clientes. O diretório de Organizações mantém os documentos de cada cliente à mão.
          landlord:
            name: Senhorio / gestor de imóveis
            description: Arquive contratos de arrendamento, recibos de renda e faturas de serviços por imóvel. Os lembretes de IA avisam-no antes de prazos de renovação.
          traveler:
            name: Viajante frequente
            description: O Campbooks extrai cada trecho de viagem e liga-o automaticamente ao calendário para nunca perder uma ligação ou um prazo de renovação.
          ecommerce:
            name: Vendedor online
            description: O ruído de pedidos colapsa num único grupo para a caixa de entrada ficar organizada. Faturas, ordens de compra e devoluções são arquivadas mal chegam.
