      s3_task: 'Percorra as três: arquive o ruído, mantenha o que importa.'
      s3_title: Trate de uma pilha em segundos
      s3_why: O Skim agrupa a sua caixa de entrada em pilhas e reproduz-nas como Stories.
        Toma uma decisão por pilha — manter o que importa, arquivar o ruído — em vez
        de abrir dezenas de emails.
      s4_dismiss: ou dispensar
