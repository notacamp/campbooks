      s1_body: O Campbooks é uma caixa de entrada que se organiza sozinha. Em cerca
        de um minuto, mostro-lhe as quatro coisas que o tornam diferente — experimente
        cada uma à medida que avançamos.
      s1_point_ask: Pergunte qualquer coisa à sua caixa de entrada
      s1_point_remind: Os prazos nunca lhe escapam
      s1_point_skim: Trate de uma pilha inteira em segundos
      s1_point_surface: O Scout destaca apenas o que precisa de si
      s1_title: Bem-vindo ao Campbooks
      s2_badge: Precisa de si
      s2_eyebrow: A sua página inicial
      s2_feedback: É a ideia principal, sem abrir o email. A notificação do LinkedIn
        em baixo era ruído, por isso o Scout deixou-a ficar.
      s2_summary: Um código único para confirmar a sua transferência bancária — expira
        em 10 minutos, por isso vale a pena ver agora.
      s2_task: Toque na mensagem que o Scout assinalou para ver o que ele extraiu.
      s2_title: O Scout destaca o que precisa de si
      s2_why: O Scout lê cada email à medida que chega e traz para a frente apenas
        o que importa. Tudo o resto fica discretamente fora do caminho.
      s3_eyebrow: Skim
      s3_feedback: É a pilha toda, tratada. O correio arquivado continua pesquisável
        e todas as ações podem ser anuladas.
