      s5_approve: Approuver
      s5_approved: "Approuvé"

      # Diapositive 6 : Bien plus encore
      more_mod: Bien plus encore
      s6_title: "Et ce n'est que la version courte."
      s6_body: Parcourez votre boîte de réception comme des stories. Posez à Scout n'importe quelle question sur vos e-mails et fichiers, en langage naturel. Créez vos propres règles et groupes -- ou allez plus loin avec des résumés, des modèles, une API REST et l'hébergement personnel.
