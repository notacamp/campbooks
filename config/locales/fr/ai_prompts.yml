fr:
  ai_prompts:
    nav_label: "Instructions IA"
    customize_button: "Personnaliser l'IA"
    ai_settings_link: "Vous voulez changer ce que l'IA extrait ou comment elle classe les éléments ?"
    ai_settings_link_cta: "Personnaliser les instructions de l'IA"
    catalog:
      task_extraction:
        label: "Extraction des tâches"
        description: "Comment Scout choisit les tâches à extraire de vos e-mails et documents."
        placeholder: "ex. : Ne crée des tâches que pour ce qu'un client attend. Ignore ce qui vient de notre équipe."
        example: "Traite les demandes des clients comme prioritaires et ne crée pas de tâches à partir des newsletters internes."
      document_analysis:
        label: "Analyse des documents"
        description: "Comment Scout lit et classe les fichiers et pièces jointes que vous recevez."
        placeholder: "ex. : Pour les factures fournisseurs, indique toujours le numéro de commande dans le titre."
        example: "Pour les factures, extrais toujours le nom du fournisseur et le total. Traite les documents en portugais comme des pièces fiscales."
      reminder_extraction:
        label: "Extraction des rappels"
        description: "Comment Scout repère les dates à retenir : échéances, renouvellements, rendez-vous."
        placeholder: "ex. : Signale toujours les échéances de paiement. Ignore les délais « offre limitée » du marketing."
        example: "Signale les dates de renouvellement de contrat et de paiement. Ne crée pas de rappels à partir des offres promotionnelles."
      email_analysis:
        label: "Résumés d'e-mails"
        description: "Comment Scout résume chaque e-mail et décide de ce qui requiert votre attention."
        placeholder: "ex. : Limite les résumés à une ligne. Signale comme prioritaire tout ce qui concerne une panne."
        example: "Limite les résumés à une phrase courte. Traite tout ce qui vient de notre plus gros client comme prioritaire."
      email_classification:
        label: "Étiquetage des e-mails"
        description: "Comment Scout classe les e-mails entrants dans vos étiquettes."
        placeholder: "ex. : Tout ce qui mentionne une facture ou un reçu va dans Finances."
        example: "Dirige les e-mails de planification vers l'étiquette Réunions ; place les factures fournisseurs dans Finances."
    settings:
      title: "Instructions IA"
      subtitle: "Donnez à Scout vos propres consignes sur la façon de lire votre boîte de réception, vos documents et plus encore. Vos notes s'ajoutent aux instructions intégrées — elles ne remplacent jamais le format de sortie ni les règles de sécurité."
      customized: "Personnalisé"
      default: "Par défaut"
      edit: "Modifier"
      help_title: "Comment ça marche"
      help_body: "Vos instructions sont ajoutées au prompt intégré de Scout pour chaque fonction, si bien que le format et les règles de sécurité restent en place. Faites-les courtes et précises — dites quoi prioriser, ignorer ou étiqueter. Videz le champ pour revenir au réglage par défaut."
      saved: "Instructions enregistrées pour %{name}."
      cleared: "%{name} revient aux instructions par défaut."
    modal:
      title: "Personnaliser : %{name}"
      intro: "Ajoutez vos consignes ci-dessous. Elles s'ajoutent aux instructions intégrées de Scout pour cette fonction — le format de sortie et les règles de sécurité restent en place."
      label: "Vos instructions"
      hint: "Le langage simple fonctionne mieux. Dites quoi prioriser, ignorer ou comment étiqueter."
      example_label: "Par exemple"
      reset_hint: "Laissez vide et enregistrez pour rétablir le réglage par défaut."
      cancel: "Annuler"
      save: "Enregistrer les instructions"
      close: "Fermer"
