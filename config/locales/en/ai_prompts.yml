en:
  ai_prompts:
    nav_label: "AI Prompts"
    customize_button: "Customize AI"
    ai_settings_link: "Want to change what the AI extracts or how it labels things?"
    ai_settings_link_cta: "Customize AI prompts"
    catalog:
      task_extraction:
        label: "Task extraction"
        description: "How Scout decides which to-dos to pull from your emails and documents."
        placeholder: "e.g. Only create tasks for things a client is waiting on. Skip anything from our own team."
        example: "Treat requests from clients as high priority, and don't create tasks from internal newsletters."
      document_analysis:
        label: "Document analysis"
        description: "How Scout reads and labels the files and attachments you receive."
        placeholder: "e.g. For supplier invoices, always capture the PO number in the title."
        example: "For invoices, always pull the supplier name and total. Treat documents in Portuguese as fiscal records."
      reminder_extraction:
        label: "Reminder extraction"
        description: "How Scout spots dates worth remembering — due dates, renewals, appointments."
        placeholder: "e.g. Always flag payment due dates. Ignore marketing 'limited time' deadlines."
        example: "Flag contract renewal and payment dates. Don't create reminders from promotional offers."
      email_analysis:
        label: "Email summaries"
        description: "How Scout summarizes each email and decides what needs your attention."
        placeholder: "e.g. Keep summaries to one line. Flag anything about an outage as high priority."
        example: "Keep summaries to one short sentence. Treat anything from our biggest client as high priority."
      email_classification:
        label: "Email tagging"
        description: "How Scout sorts incoming email into your tags."
        placeholder: "e.g. Anything mentioning an invoice or receipt goes under Finance."
        example: "Route scheduling emails to the Meetings tag; put supplier invoices under Finance."
    settings:
      title: "AI Prompts"
      subtitle: "Give Scout your own guidance for how it reads your inbox, documents, and more. Your notes are added on top of the built-in instructions — they never replace the output format or safety rules."
      customized: "Customized"
      default: "Default"
      edit: "Edit"
      help_title: "How this works"
      help_body: "Your instructions are appended to Scout's built-in prompt for each feature, so the underlying format and safety rules stay in place. Keep them short and specific — say what to prioritize, ignore, or label. Clear the box to go back to the default."
      saved: "Saved your instructions for %{name}."
      cleared: "%{name} is back to the default instructions."
    modal:
      title: "Customize: %{name}"
      intro: "Add your own guidance below. It's added to Scout's built-in instructions for this feature — the output format and safety rules stay in place."
      label: "Your instructions"
      hint: "Plain language works best. Say what to prioritize, ignore, or how to label things."
      example_label: "For example"
      reset_hint: "Leave empty and save to restore the default."
      cancel: "Cancel"
      save: "Save instructions"
      close: "Close"
