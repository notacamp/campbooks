      # Slide 6: Much more
      more_mod: Much more
      s6_title: "And that's the short version."
      s6_body: Skim your inbox like stories. Ask Scout anything about your mail and files, in plain language. Build your own rules and groups -- or go deeper with digests, templates, a REST API, and full self-hosting.
