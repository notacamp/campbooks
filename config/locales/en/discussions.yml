---
en:
  discussions:
    scout:
      # Posted by Scout into an email's discussion thread when it extracts a
      # calendar event or a reminder from that email. Markdown (rendered with safe
      # links); %{url} points back to the created record. A reminder posts with
      # Approve / Dismiss buttons (ai_suggested_actions) so it reads as a suggestion
      # to confirm, not a done deal.
      calendar_event_created: "📅 I added **[%{title}](%{url})** to your calendar — %{at}."
      reminder_found: "🔔 I spotted a potential reminder in this email. Want me to add it to your calendar?"
      reminder_line: "**[%{title}](%{url})** — due %{due}"
