# GoReleaser config for the campbooks CLI.
#
# The CLI is a Go module nested in a Rails repo and released on its OWN tag line
# (cli/vX.Y.Z), independent of the app's vX.Y.Z image releases. Run from the repo
# root:  goreleaser release --clean -f cli/.goreleaser.yaml
#
# Validate locally without publishing:  goreleaser release --snapshot --clean -f cli/.goreleaser.yaml
version: 2

project_name: campbooks

monorepo:
  tag_prefix: cli/
  dir: cli

builds:
  - id: campbooks
    binary: campbooks
    main: .
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: campbooks
    name_template: "campbooks_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Publish/update the Homebrew formula in the public tap repo so
# `brew install notacamp/tap/campbooks` works. Requires a HOMEBREW_TAP_TOKEN
# secret (a PAT with contents:write on notacamp/homebrew-tap) and that repo to
# exist with a top-level Formula/ directory.
brews:
  - name: campbooks
    repository:
      owner: notacamp
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/notacamp/campbooks"
    description: "Developer CLI for Campbooks — drive your inbox, documents, and Scout from the terminal"
    install: |
      bin.install "campbooks"
    test: |
      system "#{bin}/campbooks", "--version"
