# XcodeGen spec — generates Campbooks.xcodeproj from this file + the Swift
# sources. We keep the project as code (not a binary .xcodeproj) so it's
# reviewable and reproducible. Run `xcodegen` in this directory to (re)generate.
#
#   brew install xcodegen
#   cd native/ios && xcodegen && open Campbooks.xcodeproj
name: Campbooks
options:
  bundleIdPrefix: com.notacamp
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

packages:
  HotwireNative:
    url: https://github.com/hotwired/hotwire-native-ios
    from: "1.2.0"

targets:
  Campbooks:
    type: application
    platform: iOS
    sources:
      - path: Campbooks
    dependencies:
      - package: HotwireNative
        product: HotwireNative
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notacamp.campbooks
        INFOPLIST_FILE: Campbooks/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
