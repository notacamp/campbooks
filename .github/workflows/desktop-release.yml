# Builds the Campbooks desktop app (Tauri) for macOS, Windows and Linux and
# attaches the installers to a DRAFT GitHub Release.
#
# ⚠️ Triggered on `desktop-v*` tags (and manual dispatch) ONLY — deliberately
# NOT the `vX.Y.Z` release tags, which drive `publish-image.yml` → a production
# deploy. The desktop app versions independently from the web app (its version
# lives in native/desktop/src-tauri/tauri.conf.json).
name: desktop-release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libxdo-dev libssl-dev build-essential file

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: native/desktop/src-tauri -> target

      - name: Build, sign and draft a release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- macOS signing + notarization (set these secrets to sign; unset = unsigned) ---
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # --- Tauri updater signing (set when auto-update is activated) ---
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: native/desktop
          tagName: desktop-v__VERSION__
          releaseName: "Campbooks Desktop v__VERSION__"
          releaseBody: "See the assets below to download and install Campbooks for desktop."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
