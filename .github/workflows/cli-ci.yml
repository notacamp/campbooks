name: CLI

# Format-check, vet, build, and test the Go CLI. Runs ONLY when cli/ changes, so
# backend-only PRs aren't gated on Go (and Go-only PRs aren't gated on Rails).
# Release builds (binaries + Homebrew formula) live in release-cli.yml.
on:
  pull_request:
    paths:
      - "cli/**"
      - ".github/workflows/cli-ci.yml"
  push:
    branches: [main]
    paths:
      - "cli/**"

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache-dependency-path: cli/go.sum

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi

      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
