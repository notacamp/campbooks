name: Notify deploy

# On every push to main, ping the PRIVATE campbooks-cloud repo to deploy this
# commit. There is NO deploy logic or infrastructure detail here — only this
# ping. The actual build/deploy (rsync -> rebuild -> health check) runs in
# the private campbooks-cloud repo's deploy workflow.
#
# Requires a repository secret CAMPBOOKS_CLOUD_DISPATCH_TOKEN: a fine-grained PAT
# (or GitHub App token) with "Contents: read & write" on notacamp/campbooks-cloud
# — the minimum scope that authorizes a repository_dispatch to that repo.

on:
  push:
    branches: [main]

# This job only sends an API call with the PAT below — it needs no GITHUB_TOKEN scopes.
permissions: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    # Never fire from forks (they don't have the dispatch token anyway).
    if: ${{ github.event.repository.fork == false }}
    steps:
      - name: Dispatch deploy to campbooks-cloud
        env:
          DISPATCH_TOKEN: ${{ secrets.CAMPBOOKS_CLOUD_DISPATCH_TOKEN }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository_owner }}/campbooks-cloud/dispatches" \
            -d "{\"event_type\":\"campbooks-main-push\",\"client_payload\":{\"sha\":\"${{ github.sha }}\"}}"
