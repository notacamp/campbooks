name: Notify website deploy

# On pushes to main that touch website/, ping the PRIVATE campbooks-cloud repo
# to build + deploy the marketing site to the Hetzner host. There is NO deploy
# logic or infrastructure detail here — only this ping. The actual build + rsync
# runs in campbooks-cloud's deploy-website.yml.
#
# Uses the same CAMPBOOKS_CLOUD_DISPATCH_TOKEN as notify-deploy.yml.

on:
  push:
    branches: [main]
    paths:
      - 'website/**'

# This job only sends an API call with the PAT below — it needs no GITHUB_TOKEN scopes.
permissions: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    # Never fire from forks (they don't have the dispatch token anyway).
    if: ${{ github.event.repository.fork == false }}
    steps:
      - name: Dispatch website deploy to campbooks-cloud
        env:
          DISPATCH_TOKEN: ${{ secrets.CAMPBOOKS_CLOUD_DISPATCH_TOKEN }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository_owner }}/campbooks-cloud/dispatches" \
            -d "{\"event_type\":\"campbooks-website-push\",\"client_payload\":{\"sha\":\"${{ github.sha }}\"}}"
