name: Base image

# Pre-build ghcr.io/notacamp/campbooks-base — the Dockerfile's `gems` target:
# runtime base + build toolchain + all OPEN-SOURCE gems, and NO application code.
# Rebuilt only when the gem set or Ruby version changes (or the Dockerfile).
#
# Release builds (publish-image.yml) start FROM this image via
# `--build-arg BUILDER_IMAGE`, so they skip compiling every gem from scratch.
# It carries open-source gems only (no :cloud secret is passed here), so it is
# safe to publish; the release build layers the private :cloud group on top and
# reconciles against the release's own Gemfile.lock. Self-host builds don't need
# this image at all — the Dockerfile's BUILDER_IMAGE defaults to a local `gems`
# stage, so `docker build .` still works with no external dependency.
#
# Built natively per-arch (amd64 on ubuntu-latest, arm64 on ubuntu-24.04-arm —
# free for public repos), pushed by digest, then merged into one multi-arch
# manifest tagged `latest`.

on:
  push:
    branches: [main]
    paths:
      - Gemfile.lock
      - .ruby-version
      - Dockerfile
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY_IMAGE: ghcr.io/${{ github.repository }}-base
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Prepare platform pair
        env:
          platform: ${{ matrix.platform }}
        run: echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the gems base by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          # Stop at the `gems` stage: base OS + build tools + open-source gems.
          target: gems
          platforms: ${{ matrix.platform }}
          cache-from: type=registry,ref=${{ env.REGISTRY_IMAGE }}:buildcache-${{ env.PLATFORM_PAIR }}
          cache-to: type=registry,ref=${{ env.REGISTRY_IMAGE }}:buildcache-${{ env.PLATFORM_PAIR }},mode=max
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY_IMAGE: ghcr.io/${{ github.repository }}-base

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          # `latest` is what publish-image.yml pulls; the sha tag is for tracing
          # which commit produced a given base image.
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:latest
