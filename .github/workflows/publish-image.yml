name: Publish image

# Build and push the production image to the GitHub Container Registry (GHCR)
# when a release is published. Releases are vX.Y.Z tags on main, which is
# protected and CI-gated, so the code is already green — but we re-run the full
# test suite here as a hard, self-contained gate before anything is published.
#
# Auth uses the built-in GITHUB_TOKEN (no secrets to configure). The first push
# creates the package linked to this repo; it starts PRIVATE — flip it to public
# in the package settings once if you want self-hosters to pull it.

on:
  release:
    types: [published]

# Active Record encryption keys are read with ENV.fetch at boot
# (config/application.rb), so the test job that boots Rails needs them present.
# Dummy values for CI; real keys live in prod env.
env:
  ACTIVE_RECORD_PRIMARY_KEY: ci_dummy_primary_key_not_used_in_production
  ACTIVE_RECORD_DETERMINISTIC_KEY: ci_dummy_deterministic_key_not_for_prod
  ACTIVE_RECORD_KEY_DERIVATION_SALT: ci_dummy_key_derivation_salt_not_prod

jobs:
  # Hard gate: re-run the full test suite before publishing. Mirrors the `test`
  # job in ci.yml — keep the two in sync.
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libpq-dev

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
          # Active Record encryption keys are read with ENV.fetch at boot
          # (config/application.rb). Dummy values for CI; real keys live in prod env.
          ACTIVE_RECORD_PRIMARY_KEY: ci_dummy_primary_key_not_used_in_production
          ACTIVE_RECORD_DETERMINISTIC_KEY: ci_dummy_deterministic_key_not_for_prod
          ACTIVE_RECORD_KEY_DERIVATION_SALT: ci_dummy_key_derivation_salt_not_prod
        run: bin/rails db:test:prepare test

  build_and_push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Emulation for the arm64 leg of the build. The prod host (Hetzner CAX41)
      # and many self-hosters run arm64, so amd64-only images would not run there.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # Stable releases get 1.2.3, 1.2, and `latest`; prereleases get only
          # their full version (latest=auto leaves `latest` untouched for them).
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Multi-arch: amd64 (most cloud hosts) + arm64 (the prod host and
          # Apple Silicon / ARM self-hosters). The arm64 leg builds under QEMU
          # emulation, so a release build takes longer — fine at release cadence.
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger production deploy (campbooks-cloud)
        # Fire ONLY after the image is pushed, and ONLY for full releases (not
        # prereleases) — so a prerelease can smoke-test the build without shipping
        # to prod. Sends the version to campbooks-cloud's deploy.yml, which pulls
        # ghcr.io/notacamp/campbooks:<version>. Replaces the old notify-deploy.yml
        # (which deployed on every push to main).
        if: ${{ github.event.release.prerelease == false }}
        env:
          DISPATCH_TOKEN: ${{ secrets.CAMPBOOKS_CLOUD_DISPATCH_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"   # strip leading v -> 1.2.3
          curl -fsS -X POST \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository_owner }}/campbooks-cloud/dispatches" \
            -d "{\"event_type\":\"campbooks-release\",\"client_payload\":{\"version\":\"$VERSION\"}}"
