name: 💡 Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Campbooks aims to be a calm, AI-native inbox for
        young professionals and small-business owners — proposals that fit that
        direction (see [docs/messaging.md](https://github.com/notacamp/campbooks/blob/main/docs/messaging.md))
        are easiest to take on.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The user need or pain point — not just the solution.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What you'd like to see happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
