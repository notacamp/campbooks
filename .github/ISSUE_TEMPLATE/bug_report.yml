name: 🐛 Bug report
description: Something isn't working the way it should
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Please don't include secrets, tokens, or personal
        data in logs or screenshots. **Security issue?** Don't file it here — see
        [SECURITY.md](https://github.com/notacamp/campbooks/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See the error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: From `/up`, the Settings sidebar, or the VERSION file.
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: How are you running Campbooks?
      options:
        - Self-hosted (Docker)
        - Hosted cloud (app.campbooks.not-a-camp.com)
        - Local development
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser / OS, and any relevant providers (Gmail, Microsoft, Zoho…).
      placeholder: "Chrome 126 on macOS; Gmail account"
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Relevant output, with secrets and personal data redacted.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: This is not a security vulnerability (those go through SECURITY.md).
          required: true
